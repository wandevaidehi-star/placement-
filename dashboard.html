<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Dashboard</title>

<script>

// Check if user is logged in
const token = localStorage.getItem("token");

if(!token){

    alert("Please Login First");

    window.location.href = "login.html";

}

</script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f7fb;
}

header{
background:#4f46e5;
color:white;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
}

header h2{
font-size:26px;
}

.logout{
background:red;
color:white;
padding:10px 20px;
text-decoration:none;
border-radius:8px;
cursor:pointer;
}

.container{
padding:30px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.card{
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,.15);
text-align:center;
transition:.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card h3{
color:#4f46e5;
margin-bottom:15px;
}

.card p{
color:#555;
}

</style>

</head>

<body>

<header>

<h2>Education & Placement Portal</h2>

<a href="#" class="logout" onclick="logout()">
Logout
</a>

</header>

<div class="container">

<div class="cards">

<div class="card">
<h3>👤 Profile</h3>
<p>View your profile information.</p>
</div>

<div class="card">
<h3>📚 Courses</h3>
<p>See enrolled courses.</p>
</div>

<div class="card">
<h3>📄 Resume</h3>
<p>Upload your resume.</p>
</div>

<div class="card">
<h3>💼 Placements</h3>
<p>Apply for companies.</p>
</div>

<div class="card">
<h3>📈 Progress</h3>
<p>Track your learning.</p>
</div>

<div class="card">
<h3>📢 Notices</h3>
<p>Latest announcements.</p>
</div>

</div>

</div>

<script>

function logout(){

    localStorage.removeItem("token");

    alert("Logged Out Successfully!");

    window.location.href = "login.html";

}

</script>

</body>
</html>
