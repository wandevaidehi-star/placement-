<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Login</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:linear-gradient(135deg,#4f46e5,#06b6d4);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.box{
    background:white;
    padding:40px;
    border-radius:15px;
    width:350px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h2{
    text-align:center;
    color:#4f46e5;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ddd;
    border-radius:8px;
    font-size:15px;
}

button{
    width:100%;
    padding:12px;
    background:#4f46e5;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#3730a3;
}

</style>
</head>

<body>

<div class="box">

<h2>Student Login</h2>

<form id="loginForm">

<input
type="email"
id="email"
placeholder="Email"
required>

<input
type="password"
id="password"
placeholder="Password"
required>

<button type="submit">
Login
</button>

</form>

</div>

<script>

document.getElementById("loginForm").addEventListener("submit", async function(e){

    e.preventDefault();

    const user = {

        email: document.getElementById("email").value,

        password: document.getElementById("password").value

    };

    try{

        const response = await fetch("https://placement-1-51ft.onrender.com/register",{

            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify(user)

        });

        const data = await response.json();

        if(response.ok){

    localStorage.setItem("token", data.access_token);

    alert("Login Successful!");

    window.location.href="dashboard.html";

}
        else{

            alert(data.detail);

        }

    }catch(error){

        alert("Cannot connect to FastAPI Server!");

        console.log(error);

    }

});

</script>

</body>
</html>
